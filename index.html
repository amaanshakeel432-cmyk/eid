<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid-ul-Fitr Mubarak!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Satisfy&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-green: #0a280a;
            --black: #000000;
            --golden: #7bff00;
            --golden-heading: #ffc107; 
            --cream-text: #ffebcc;
            --button-text-green: #143d14;
            --input-bg: #fafff0;
            --input-border: #ccffcc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow-x: hidden; }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at bottom, var(--dark-green) 0%, var(--black) 70%);
            color: var(--cream-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Mobile par upar se start ho */
            min-height: 100vh;
            padding: 10px;
            text-align: center;
            padding-bottom: 70px; /* Ad ke liye space */
        }

        #fireworksCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .container {
            background: rgba(10, 40, 10, 0.85);
            border: 2px solid var(--golden);
            border-radius: 12px;
            padding: 15px 20px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            max-width: 450px; width: 95%;
            position: relative; z-index: 10;
            margin-top: 5px; /* Thoda gap upar se */
        }

        /* --- Image Size Optimized --- */
        #eidImage { 
            width: 100%; 
            max-width: 160px; /* Mobile par chhota rakha hai */
            border-radius: 8px; 
            border: 2px solid var(--golden); 
            margin-bottom: 10px; 
        }

        /* --- Heading Size Optimized --- */
        #mainHeading { 
            font-family: 'Satisfy', cursive; 
            color: var(--golden-heading); 
            font-size: 2rem; /* Size reduced */
            margin-bottom: 5px; 
            text-shadow: 0 0 5px rgba(255, 193, 7, 0.5);
        }

        #fromSender { 
            font-size: 1.2rem; 
            color: var(--golden); 
            margin-bottom: 8px; 
            font-weight: 600;
        }

        /* Continuous Animated Line Optimized */
        #familyWishingMessage {
            font-size: 0.95rem; /* Text size reduced for mobile */
            font-weight: 600; 
            color: #7bff00; 
            margin: 10px 0; 
            line-height: 1.4; 
            display: block;
            animation: continuousGlow 2.5s infinite ease-in-out;
        }

        @keyframes continuousGlow {
            0%, 100% { transform: scale(1); text-shadow: 0 0 5px rgba(123, 255, 0, 0.3); }
            50% { transform: scale(1.05); color: #fff; text-shadow: 0 0 15px rgba(124, 255, 0, 0.7); }
        }

        /* Fixed Ad Container */
        .ad-bottom-fixed {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60px;
            background: rgba(0, 0, 0, 0.9); display: flex; justify-content: center;
            align-items: center; z-index: 99999; border-top: 1px solid var(--golden);
        }

        /* Music Button Positioning */
        #musicToggleButton {
            position: absolute; top: 0; right: 0; transform: translateY(-30px);
            width: 34px; height: 34px; border-radius: 50%; background: var(--golden);
            border: 2px solid var(--golden-heading); cursor: pointer; z-index: 20; 
        }

        /* Form Elements Compact */
        #senderSection { margin-top: 5px; }
        label { font-size: 0.85rem; margin-bottom: 4px; display: block; }
        input[type="text"] { 
            width: 100%; 
            padding: 10px; 
            margin-bottom: 10px; 
            border-radius: 6px; 
            font-size: 0.9rem;
            border: 1px solid var(--input-border);
        }
        
        button:not(#musicToggleButton) { 
            background: linear-gradient(145deg, var(--golden), #a2ff00); 
            color: var(--button-text-green); 
            border: none; 
            padding: 10px; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%;
            font-size: 0.95rem;
        }

        #shareSection { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--golden); }

        /* Animations */
        .main-heading-animate { animation: mainHeadingAnim 1s forwards; }
        @keyframes mainHeadingAnim { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        @media (min-width: 600px) {
            body { justify-content: center; }
            #eidImage { max-width: 200px; }
            #mainHeading { font-size: 2.8rem; }
            #familyWishingMessage { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <canvas id="fireworksCanvas"></canvas>

    <div class="container">
        <img id="eidImage" src="eid.gif" alt="Eid Mubarak">
        <h1 id="mainHeading">Eid Mubarak</h1>
        <p id="fromSender" style="display:none;"></p>
        <p id="familyWishingMessage">Infoma Academy Wishing you and your family a blessed Eid-ul-Fitr!</p>

        <div id="senderSection" style="position:relative;">
            <button id="musicToggleButton">🔈</button>
            <label>Your Name:</label>
            <input type="text" id="senderName" placeholder="Enter your name">
            <button id="createShareButton">Create & Share Greeting</button>
        </div>

        <div id="shareSection" style="display:none;">
            <div style="display: flex; align-items: center;">
                <input type="text" id="generatedLink" readonly style="margin-bottom:0;">
                <button id="copyButton" style="width: 70px; margin-left: 5px; padding: 10px 0;">Copy</button>
            </div>
        </div>
    </div>

    <!-- ADSTERRA AD -->
    <div class="ad-bottom-fixed">
        <script type="text/javascript">
            atOptions = { 'key' : '501f153248c74c09ae2d7bf728d506c2', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/501f153248c74c09ae2d7bf728d506c2/invoke.js"></script>
    </div>

    <audio id="backgroundSong" src="song.mp3" loop hidden></audio> 
    
    <script>
        const mainHeadingEl = document.getElementById('mainHeading');
        const fromSenderText = document.getElementById('fromSender');
        const senderNameInput = document.getElementById('senderName');
        const createShareButton = document.getElementById('createShareButton');
        const shareSection = document.getElementById('shareSection');
        const generatedLinkInput = document.getElementById('generatedLink');
        const copyButton = document.getElementById('copyButton');
        const musicToggleButton = document.getElementById('musicToggleButton'); 
        const backgroundSong = document.getElementById('backgroundSong');

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const sender = urlParams.get('sender');
            if (sender) {
                mainHeadingEl.classList.add('main-heading-animate');
                fromSenderText.textContent = `From ${decodeURIComponent(sender)}`;
                fromSenderText.style.display = 'block';
            }
            initFireworks();
        });

        musicToggleButton.addEventListener('click', () => {
            if (backgroundSong.paused) {
                backgroundSong.play().then(() => { musicToggleButton.innerHTML = '🔊'; }).catch(e => console.log("User must interact first"));
            } else {
                backgroundSong.pause(); musicToggleButton.innerHTML = '🔈';
            }
        });

        createShareButton.addEventListener('click', () => {
            const name = senderNameInput.value.trim();
            if (!name) return alert("Please enter your name");
            const generatedUrl = `${window.location.origin}${window.location.pathname}?sender=${encodeURIComponent(name)}`;
            generatedLinkInput.value = generatedUrl;
            shareSection.style.display = 'block';
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(name + ' sends you Eid greetings! 🎉 ' + generatedUrl)}`, '_blank'); 
        });

        copyButton.addEventListener('click', () => {
            generatedLinkInput.select();
            document.execCommand('copy');
            copyButton.textContent = 'OK!';
            setTimeout(() => copyButton.textContent = 'Copy', 2000);
        });

        // Optimized Fireworks for performance
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initFireworks() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            setInterval(() => {
                const x = Math.random() * canvas.width;
                const y = Math.random() * (canvas.height / 3);
                for(let i=0; i<20; i++) particles.push({ x, y, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4, a:1, c:`hsl(${Math.random()*360},100%,50%)` });
            }, 1200);
            animate();
        }
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Mobile performance
            particles.forEach((p,i) => {
                p.x+=p.vx; p.y+=p.vy; p.a-=0.015;
                ctx.globalAlpha=p.a; ctx.fillStyle=p.c;
                ctx.beginPath(); ctx.arc(p.x,p.y,1.5,0,Math.PI*2); ctx.fill();
                if(p.a<=0) particles.splice(i,1);
            });
        }
    </script>
</body>
</html>
