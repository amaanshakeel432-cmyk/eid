<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 Eid-ul-Fitr Mubarak! ✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;700&family=Satisfy&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dark-green: #0a280a;
            --black: #000000;
            --golden: #7bff00;
            --golden-heading: #ffc107; 
            --cream-text: #ffebcc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow-x: hidden; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at bottom, var(--dark-green) 0%, var(--black) 70%);
            color: var(--cream-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 5px;
            text-align: center;
            padding-bottom: 75px; 
        }

        #animationCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        /* --- SUGGESTION 1: FLOATING LANTERNS --- */
        .lantern {
            position: fixed; font-size: 35px; z-index: 5;
            animation: floatLantern 4s ease-in-out infinite;
            filter: drop-shadow(0 0 10px var(--golden-heading));
            pointer-events: none;
        }
        @keyframes floatLantern {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-25px) rotate(5deg); }
        }

        .container {
            background: rgba(10, 40, 10, 0.85);
            border: 2px solid var(--golden);
            border-radius: 15px;
            padding: 10px 15px;
            box-shadow: 0 0 25px rgba(123, 255, 0, 0.3);
            max-width: 450px; width: 95%;
            position: relative; z-index: 10;
            margin-top: 5px;
        }

        #eidImage { width: 100%; max-width: 100px; border-radius: 10px; margin-bottom: 2px; }

        #mainHeading { 
            font-family: 'Satisfy', cursive; 
            color: var(--golden-heading); 
            font-size: 8.5vw; 
            white-space: nowrap; 
            margin-bottom: 15px; 
            text-shadow: 0 0 12px rgba(255, 193, 7, 0.8);
            display: inline-block;
            animation: floatingWave 3s ease-in-out infinite;
        }

        @keyframes floatingWave {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-8px) rotate(-1deg); }
            75% { transform: translateY(8px) rotate(1deg); }
        }

        @keyframes fingerBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }

        .animated-label {
            display: block; font-size: 1.1rem; font-weight: 800;
            color: var(--golden); margin: 25px 0;
            animation: fingerBounce 1.2s ease-in-out infinite;
            text-shadow: 0 0 10px var(--golden), 0 0 20px rgba(123, 255, 0, 0.6);
        }

        .sender-badge {
            display: none; background: rgba(255, 255, 255, 0.1); border: 1px solid var(--golden);
            padding: 4px 18px; border-radius: 20px 4px 20px 4px;
            font-family: 'Great Vibes', cursive; font-size: 1.4rem; color: #fff;
            margin: 5px auto 10px auto; width: fit-content; box-shadow: 0 0 12px var(--golden);
            position: relative; overflow: hidden; animation: badgeFloat 3s infinite;
        }

        #familyWishingMessage { font-size: 0.85rem; font-weight: 700; color: #7bff00; margin-bottom: 5px; line-height: 1.4; }

        .dua-box {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--golden);
            border-radius: 10px; height: 95px; margin: 8px 0;
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .dua-slide { position: absolute; width: 100%; padding: 5px 10px; opacity: 0; transition: 0.6s; }
        .dua-slide.active { opacity: 1; }
        
        input[type="text"] { 
            width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 8px; 
            border: 2px solid var(--golden); background: #fafff0; text-align: center; font-weight: bold; font-size: 1rem;
        }
        
        button { 
            background: linear-gradient(145deg, var(--golden), #a2ff00); 
            color: #143d14; border: none; padding: 14px; border-radius: 8px; 
            font-weight: 800; cursor: pointer; width: 100%; font-size: 1rem; text-transform: uppercase;
            box-shadow: 0 4px 0px #4e8a00;
        }

        .ad-bottom-fixed { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: #000; z-index: 999; border-top: 1px solid var(--golden); }

        @media (min-width: 480px) {
            #mainHeading { font-size: 2.5rem; }
            .animated-label { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <!-- Floating Lanterns -->
    <div class="lantern" style="top: 10%; left: 3%;">🏮</div>
    <div class="lantern" style="top: 15%; right: 3%; animation-delay: 1s;">🏮</div>

    <canvas id="animationCanvas"></canvas>

    <div class="container">
        <img id="eidImage" src="eid.gif" alt="Eid Mubarak">
        <h1 id="mainHeading">🌙 Eid Mubarak ✨</h1>
        <div id="fromSender" class="sender-badge"></div>
        <p id="familyWishingMessage">🎊 Wishing you and your family <br> a blessed Eid-ul-Fitr! 🕌</p>

        <div class="dua-box">
            <div class="dua-slide active">
                <span style="display:block; font-size:1.3rem; margin-bottom:12px;">🤲</span>
                <p style="font-size:0.8rem; font-style:italic;">"May Allah shower His countless blessings upon you and your family."</p>
            </div>
            <div class="dua-slide">
                <span style="display:block; font-size:1.3rem; margin-bottom:12px;">✨</span>
                <p style="font-size:0.8rem; font-style:italic;">"May this Eid bring joy, peace, and prosperity to your beautiful life."</p>
            </div>
        </div>

        <div id="senderSection">
            <label class="animated-label">👇 ENTER YOUR NAME 👇</label>
            <input type="text" id="senderName" placeholder="Type your name here..." onfocus="playMusic()">
            <button id="createShareButton" onclick="handleCreate()">🚀 Create & Share Greeting</button>
        </div>

        <div id="shareSection" style="display:none; margin-top:10px;">
            <div style="display: flex; align-items: center;">
                <input type="text" id="generatedLink" readonly style="margin-bottom:0;">
                <button id="copyButton" style="width: 70px; margin-left: 5px; padding: 10px 0;">📋 Copy</button>
            </div>
        </div>

        <div style="color:var(--golden); font-size:0.8rem; margin-top:15px; opacity:0.6;">
            <p style="border-top: 1px solid #7bff0033; padding-top: 10px;"><b>© Brought To You By Infoma</b></p>
        </div>
    </div>

    <audio id="backgroundSong" src="song.mp3" loop preload="auto"></audio> 
    
    <script>
        const backgroundSong = document.getElementById('backgroundSong');
        const canvas = document.getElementById('animationCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function playMusic() { if (backgroundSong.paused) backgroundSong.play().catch(e => {}); }

        // Dua Slider
        let currentSlide = 0;
        const slides = document.querySelectorAll('.dua-slide');
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 2500);

        // Load Name
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const sender = urlParams.get('sender');
            if (sender) {
                const badge = document.getElementById('fromSender');
                badge.innerHTML = `✨ ${decodeURIComponent(sender)} ✨`;
                badge.style.display = 'block';
            }
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            animate();
        });

        // Firework Logic
        function createFirework(x, y, color = '#7bff00') {
            for(let i=0; i<40; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, size: Math.random()*3, color, life: 1 });
            }
        }

        // SUGGESTION 4: INTERACTIVE BURST
        function handleCreate() {
            const name = document.getElementById('senderName').value.trim();
            if (!name) return alert("Please type your name! ✍️");
            
            playMusic();
            // Button click par center mein burst
            createFirework(window.innerWidth/2, window.innerHeight/2, '#ffc107');
            createFirework(window.innerWidth/2, window.innerHeight/2, '#7bff00');

            const generatedUrl = `${window.location.origin}${window.location.pathname}?sender=${encodeURIComponent(name)}`;
            document.getElementById('generatedLink').value = generatedUrl;
            document.getElementById('shareSection').style.display = 'block';
            
            setTimeout(() => {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent('✨ ' + name + ' sends you a special Eid greeting! 🌙 ' + generatedUrl)}`, '_blank');
            }, 800);
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life -= 0.015;
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                if(p.life <= 0) particles.splice(i, 1);
            });
        }

        // Auto background fireworks
        setInterval(() => createFirework(Math.random()*canvas.width, Math.random()*canvas.height/2), 2000);

        document.getElementById('copyButton').onclick = function() {
            const input = document.getElementById('generatedLink');
            input.select(); document.execCommand('copy');
            this.textContent = '✅'; setTimeout(() => this.textContent = '📋 Copy', 2000);
        };
    </script>
</body>
</html>
