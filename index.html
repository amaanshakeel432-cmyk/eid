<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 Eid-ul-Fitr Mubarak! ✨</title>
    <!-- Fonts Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;700&family=Satisfy&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dark-green: #0a280a;
            --black: #000000;
            --golden: #7bff00;
            --golden-heading: #ffc107; 
            --cream-text: #ffebcc;
            --button-text-green: #143d14;
            --input-bg: #fafff0;
            --input-border: #ccffcc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow-x: hidden; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at bottom, var(--dark-green) 0%, var(--black) 70%);
            color: var(--cream-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 10px;
            text-align: center;
            padding-bottom: 70px; 
        }

        #animationCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .container {
            background: rgba(10, 40, 10, 0.85);
            border: 2px solid var(--golden);
            border-radius: 15px;
            padding: 15px 20px;
            box-shadow: 0 0 25px rgba(123, 255, 0, 0.3);
            max-width: 450px; width: 95%;
            position: relative; z-index: 10;
            margin-top: 10px;
        }

        #eidImage { 
            width: 100%; 
            max-width: 140px; 
            border-radius: 10px; 
            border: 2px solid var(--golden); 
            margin-bottom: 8px; 
            box-shadow: 0 0 15px rgba(123, 255, 0, 0.4);
        }

        #mainHeading { 
            font-family: 'Satisfy', cursive; 
            color: var(--golden-heading); 
            font-size: 2.2rem;
            margin-bottom: 2px; 
            text-shadow: 0 0 8px rgba(255, 193, 7, 0.6);
        }

        #fromSender { 
            font-family: 'Great Vibes', cursive;
            font-size: 1.6rem; 
            color: var(--golden); 
            margin-bottom: 8px; 
            text-shadow: 1px 1px 2px black;
        }

        #familyWishingMessage {
            font-size: 1rem; 
            font-weight: 700; 
            color: #7bff00; 
            margin: 10px 0; 
            line-height: 1.4; 
            display: block;
            animation: continuousGlow 2.5s infinite ease-in-out;
        }

        @keyframes continuousGlow {
            0%, 100% { transform: scale(1); text-shadow: 0 0 5px rgba(123, 255, 0, 0.4); }
            50% { transform: scale(1.05); color: #fff; text-shadow: 0 0 15px rgba(124, 255, 0, 0.8); }
        }

        .ad-bottom-fixed {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60px;
            background: rgba(0, 0, 0, 0.9); display: flex; justify-content: center;
            align-items: center; z-index: 99999; border-top: 1px solid var(--golden);
        }

        label { font-size: 0.8rem; margin-bottom: 4px; display: block; font-weight: bold; }
        
        input[type="text"] { 
            width: 100%; 
            padding: 10px; 
            margin-bottom: 10px; 
            border-radius: 8px; 
            font-size: 0.9rem;
            border: 2px solid var(--golden);
            background: var(--input-bg);
            text-align: center;
            font-weight: bold;
        }
        
        button { 
            background: linear-gradient(145deg, var(--golden), #a2ff00); 
            color: var(--button-text-green); 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            font-weight: 800; 
            cursor: pointer; 
            width: 100%;
            font-size: 1rem;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #4e8a00;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #4e8a00; }

        #shareSection { margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--golden); }

        /* Animations */
        .main-heading-animate { animation: bounceIn 1.2s ease-out; }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @media (min-width: 600px) {
            #eidImage { max-width: 180px; }
            #mainHeading { font-size: 3rem; }
            #familyWishingMessage { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <canvas id="animationCanvas"></canvas>

    <div class="container">
        <img id="eidImage" src="eid.gif" alt="Eid Mubarak">
        <h1 id="mainHeading">🌙 Eid Mubarak ✨</h1>
        <p id="fromSender" style="display:none;"></p>
        <p id="familyWishingMessage">🎊 Infoma Academy Wishing you and your family a blessed Eid-ul-Fitr! 🕌🤲⭐</p>

        <div id="senderSection">
            <label>✍️ ENTER YOUR NAME BELOW:</label>
            <input type="text" id="senderName" placeholder="Type your name here...">
            <button id="createShareButton">🚀 Create & Share Greeting</button>
        </div>

        <div id="shareSection" style="display:none;">
            <div style="display: flex; align-items: center;">
                <input type="text" id="generatedLink" readonly style="margin-bottom:0;">
                <button id="copyButton" style="width: 70px; margin-left: 5px; padding: 10px 0; box-shadow: none;">📋 Copy</button>
            </div>
        </div>
    </div>

    <!-- ADSTERRA AD -->
    <div class="ad-bottom-fixed">
        <script type="text/javascript">
            atOptions = { 'key' : '501f153248c74c09ae2d7bf728d506c2', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/501f153248c74c09ae2d7bf728d506c2/invoke.js"></script>
    </div>

    <audio id="backgroundSong" src="song.mp3" loop></audio> 
    
    <script>
        const canvas = document.getElementById('animationCanvas');
        const ctx = canvas.getContext('2d');
        const backgroundSong = document.getElementById('backgroundSong');
        const mainHeadingEl = document.getElementById('mainHeading');
        const fromSenderText = document.getElementById('fromSender');
        const senderNameInput = document.getElementById('senderName');
        const createShareButton = document.getElementById('createShareButton');
        const shareSection = document.getElementById('shareSection');
        const generatedLinkInput = document.getElementById('generatedLink');
        const copyButton = document.getElementById('copyButton');

        let particles = [];

        // Audio Auto-play Logic
        const startMusic = () => {
            backgroundSong.play().catch(e => console.log("Tap to play"));
            document.removeEventListener('click', startMusic);
            document.removeEventListener('touchstart', startMusic);
        };
        document.addEventListener('click', startMusic);
        document.addEventListener('touchstart', startMusic);

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const sender = urlParams.get('sender');
            if (sender) {
                mainHeadingEl.classList.add('main-heading-animate');
                fromSenderText.innerHTML = `<span>From</span> ${decodeURIComponent(sender)} 👤`;
                fromSenderText.style.display = 'block';
            }
            initAnimations();
        });

        // Confetti & Fireworks Animation
        function initAnimations() {
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight;
            
            // Periodically launch Party Poppers from corners
            setInterval(() => {
                launchPopper(0, canvas.height, 45); // Left corner
                launchPopper(canvas.width, canvas.height, 135); // Right corner
            }, 3000);

            // Periodically launch Fireworks
            setInterval(() => {
                const x = Math.random() * canvas.width;
                const y = Math.random() * (canvas.height / 3);
                createExplosion(x, y);
            }, 1500);

            animate();
        }

        function launchPopper(x, y, baseAngle) {
            for(let i=0; i<30; i++) {
                const angle = (baseAngle + (Math.random() - 0.5) * 40) * (Math.PI / 180);
                const speed = Math.random() * 8 + 5;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: -Math.sin(angle) * speed,
                    size: Math.random() * 6 + 2,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    type: 'confetti',
                    life: 1
                });
            }
        }

        function createExplosion(x, y) {
            for(let i=0; i<25; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    size: 2,
                    color: '#7bff00',
                    type: 'firework',
                    life: 1
                });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                if(p.type === 'confetti') p.vy += 0.2; // Gravity for confetti
                p.life -= 0.01;

                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                if(p.type === 'confetti') {
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                } else {
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }

                if(p.life <= 0) particles.splice(i, 1);
            });
            ctx.globalAlpha = 1;
        }

        createShareButton.addEventListener('click', () => {
            const name = senderNameInput.value.trim();
            if (!name) return alert("Please type your name first! ✍️");
            const generatedUrl = `${window.location.origin}${window.location.pathname}?sender=${encodeURIComponent(name)}`;
            generatedLinkInput.value = generatedUrl;
            shareSection.style.display = 'block';
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent('✨ ' + name + ' sends you a special Eid-ul-Fitr greeting! 🌙 Click here: ' + generatedUrl)}`, '_blank'); 
            // Extra burst on click
            launchPopper(canvas.width/2, canvas.height, 90);
        });

        copyButton.addEventListener('click', () => {
            generatedLinkInput.select();
            document.execCommand('copy');
            copyButton.textContent = '✅ Done!';
            setTimeout(() => copyButton.textContent = '📋 Copy', 2000);
        });
    </script>
</body>
</html>
