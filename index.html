<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid-ul-Fitr Mubarak!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Satisfy&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-green: #0a280a;
            --black: #000000;
            --golden: #7bff00;
            --golden-heading: #ffc107; 
            --cream-text: #ffebcc;
            --button-text-green: #143d14;
            --input-bg: #fafff0;
            --input-border: #ccffcc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow-x: hidden; }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at bottom, var(--dark-green) 0%, var(--black) 70%);
            color: var(--cream-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
            padding-bottom: 80px; 
        }

        #fireworksCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .container {
            background: rgba(10, 40, 10, 0.85);
            border: 2px solid var(--golden);
            border-radius: 15px;
            padding: 20px 30px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.3);
            max-width: 500px; width: 90%;
            position: relative; z-index: 10;
        }

        /* Continuous Animation */
        #familyWishingMessage {
            font-size: 1.3rem; font-weight: 700; color: rgb(129, 202, 18); 
            margin: 20px 0; line-height: 1.6; display: block;
            animation: continuousGlow 2.5s infinite ease-in-out;
        }

        @keyframes continuousGlow {
            0%, 100% { transform: scale(1); text-shadow: 0 0 5px rgba(129, 202, 18, 0.5); }
            50% { transform: scale(1.08); color: #fff; text-shadow: 0 0 20px rgba(124, 255, 0, 0.8); }
        }

        .ad-bottom-fixed {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60px;
            background: rgba(0, 0, 0, 0.8); display: flex; justify-content: center;
            align-items: center; z-index: 99999; border-top: 1px solid var(--golden);
        }

        #eidImage { width: 100%; max-width: 250px; border-radius: 10px; border: 3px solid var(--golden); margin-bottom: 20px; }
        #mainHeading { font-family: 'Satisfy', cursive; color: var(--golden-heading); font-size: 3rem; margin-bottom: 10px; }
        #fromSender { font-size: 1.6rem; color: var(--cream-text); margin-bottom: 15px; opacity: 0; }
        
        #musicToggleButton {
            position: absolute; top: 0; right: 5px; transform: translateY(-100%);
            width: 38px; height: 38px; border-radius: 50%; background: var(--golden);
            border: 2px solid var(--golden-heading); cursor: pointer; z-index: 20; 
        }

        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--input-border); }
        button:not(#musicToggleButton) { background: linear-gradient(145deg, var(--golden), #a2ff00); color: var(--button-text-green); border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

        #shareSection { margin-top: 20px; padding-top: 15px; border-top: 1px dashed var(--golden); }

        .main-heading-animate { animation: mainHeadingAnim 1.5s forwards; }
        @keyframes mainHeadingAnim { 0% { transform: scale(0.3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .from-sender-animate { animation: fromSenderAnim 1.2s ease-out 0.5s forwards; }
        @keyframes fromSenderAnim { 0% { transform: translateY(30px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <canvas id="fireworksCanvas"></canvas>

    <div class="container">
        <!-- Path changed to simple relative path -->
        <img id="eidImage" src="eid.gif" alt="Eid Mubarak">
        <h1 id="mainHeading">Eid Mubarak</h1>
        <p id="fromSender" style="display:none;"></p>
        <p id="familyWishingMessage">Wishing you and your family a blessed Eid-ul-Fitr!</p>

        <div id="senderSection" style="position:relative;">
            <button id="musicToggleButton">🔈</button>
            <label style="display:block; margin-bottom:8px;">Your Name:</label>
            <input type="text" id="senderName" placeholder="Enter your name">
            <button id="createShareButton">Create & Share Eid Greeting</button>
        </div>

        <div id="shareSection" style="display:none;">
            <div style="display: flex; align-items: center;">
                <input type="text" id="generatedLink" readonly>
                <button id="copyButton" style="width: 80px; margin-left: 5px;">Copy</button>
            </div>
        </div>
    </div>

    <!-- ADSTERRA AD -->
    <div class="ad-bottom-fixed">
        <script type="text/javascript">
            atOptions = { 'key' : '501f153248c74c09ae2d7bf728d506c2', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/501f153248c74c09ae2d7bf728d506c2/invoke.js"></script>
    </div>

    <audio id="backgroundSong" src="song.mp3" loop hidden></audio> 
    
    <script>
        const mainHeadingEl = document.getElementById('mainHeading');
        const fromSenderText = document.getElementById('fromSender');
        const senderNameInput = document.getElementById('senderName');
        const createShareButton = document.getElementById('createShareButton');
        const shareSection = document.getElementById('shareSection');
        const generatedLinkInput = document.getElementById('generatedLink');
        const copyButton = document.getElementById('copyButton');
        const musicToggleButton = document.getElementById('musicToggleButton'); 
        const backgroundSong = document.getElementById('backgroundSong');

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const sender = urlParams.get('sender');
            if (sender) {
                mainHeadingEl.classList.add('main-heading-animate');
                fromSenderText.textContent = `From ${decodeURIComponent(sender)}`;
                fromSenderText.style.display = 'block';
                fromSenderText.classList.add('from-sender-animate');
            }
            initFireworks();
        });

        musicToggleButton.addEventListener('click', () => {
            if (backgroundSong.paused) {
                backgroundSong.play().then(() => { musicToggleButton.innerHTML = '🔊'; }).catch(e => console.log("Play error"));
            } else {
                backgroundSong.pause(); musicToggleButton.innerHTML = '🔈';
            }
        });

        createShareButton.addEventListener('click', () => {
            const name = senderNameInput.value.trim();
            if (!name) return alert("Please enter name");
            const generatedUrl = `${window.location.origin}${window.location.pathname}?sender=${encodeURIComponent(name)}`;
            generatedLinkInput.value = generatedUrl;
            shareSection.style.display = 'block';
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(name + ' sends you Eid greetings 🌙✨ ' + generatedUrl)}`, '_blank'); 
        });

        copyButton.addEventListener('click', () => {
            generatedLinkInput.select();
            document.execCommand('copy');
            copyButton.textContent = 'Copied!';
            setTimeout(() => copyButton.textContent = 'Copy', 2000);
        });

        // Simplified Fireworks
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initFireworks() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            setInterval(() => {
                const x = Math.random() * canvas.width;
                const y = Math.random() * (canvas.height / 2);
                for(let i=0; i<30; i++) particles.push({ x, y, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5, a:1, c:`hsl(${Math.random()*360},100%,50%)` });
            }, 1000);
            animate();
        }
        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            particles.forEach((p,i) => {
                p.x+=p.vx; p.y+=p.vy; p.a-=0.01;
                ctx.globalAlpha=p.a; ctx.fillStyle=p.c;
                ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill();
                if(p.a<=0) particles.splice(i,1);
            });
        }
    </script>
</body>
</html>
